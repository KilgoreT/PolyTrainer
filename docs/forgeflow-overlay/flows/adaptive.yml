name: adaptive
conductor_model: opus

context:
  - ticket
  - feature_name
  - branch
  - mode

modules:
  - logging
  - review
  - guides

steps:
  - step: task
    pause: true
    output: 00_task.md
    with:
      logging:
        phases:
          - "finalize:after"

  - step: figma_dump
    pause: false
    input: task.output
    output: figma_dump.json
    sets:
      - feature_has_figma
    with:
      logging:
        phases:
          - "finalize:after"

  - step: scope_analysis
    pause: true
    input:
      - task.output
      - figma_dump.output
    output: 02_scope.md
    sets:
      - infra_touched
      - business_touched
      - ui_touched
      - data_touched
      - needs_tests
      - needs_migration_tests
      - feature_has_ui_contract
      - spec_filename
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - qa_engineer

  - subflow: infra
    flow: flows/infra.yml
    if: infra_touched

  - subflow: business
    flow: flows/business.yml
    if: business_touched

  - subflow: ui
    flow: flows/ui.yml
    if: ui_touched

  - subflow: data
    flow: flows/data.yml
    if: data_touched

  - step: check
    pause: true
    with:
      logging:
        phases:
          - "finalize:after"
      checks:
        - lint
        - test
        - build

  - step: global_code_review
    pause: true
    input:
      - scope_analysis.output
      - infra_summary.output?
      - business_summary.output?
      - ui_summary.output?
      - data_summary.output?
    with:
      logging:
        phases:
          - "finalize:after"
