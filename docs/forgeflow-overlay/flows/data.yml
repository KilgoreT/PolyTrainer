name: data
description: "Data sub-flow — DB (api+impl+миграции+schemas), Prefs, Library-обёртки. Inline-разворачивается в master plan через `subflow:`. Модули и опции наследуются от master flow."

steps:
  - step: data_walkthrough
    pause: true
    input:
      - scope_analysis.output
    with:
      logging:
        phases:
          - "finalize:after"

  - name: data_design_tree
    prompt: design_tree
    output: data_design_tree.md
    pause: true
    input:
      - scope_analysis.output
      - infra_summary.output
      - business_summary.output
      - data_walkthrough.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
      checklist:
        phases:
          - "finalize:after"

  - name: data_migration_test
    prompt: migration_test
    output: data_migration_test.md
    if: needs_migration_tests
    pause: true
    input:
      - scope_analysis.output
      - data_design_tree.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - qa_engineer

  - name: data_implement
    prompt: implement
    output: data_implement.md
    pause: true
    input:
      - scope_analysis.output
      - business_summary.output
      - data_design_tree.output
      - data_migration_test.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - senior
      checklist:
        phases:
          - "finalize:after"

  - name: data_summary
    prompt: summary
    output: data_summary.md
    pause: true
    input:
      - data_design_tree.output
      - data_migration_test.output
      - data_implement.output
    with:
      logging:
        phases:
          - "finalize:after"
