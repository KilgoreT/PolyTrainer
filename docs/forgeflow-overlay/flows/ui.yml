name: ui
description: "UI sub-flow Lexeme — composables, layouts, виджеты экрана, ресурсы"

modules:
  - logging
  - review
  - guides

steps:
  - step: ui_layout
    pause: true
    input:
      - parent.scope_analysis.output
      - parent.business.output?
      - parent.figma_dump.output?
    repeat:
      until: review_passed
      max: 3
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect

  - step: design_tree
    pause: true
    input:
      - parent.scope_analysis.output
      - parent.infra.output?
      - parent.business.output?
      - parent.figma_dump.output?
      - ui_layout.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect

  - step: implement
    pause: true
    input:
      - parent.scope_analysis.output
      - parent.business.output?
      - parent.figma_dump.output?
      - ui_layout.output
      - design_tree.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - senior

  - step: publish_ui
    pause: true
    input:
      - ui_layout.output
      - implement.output
    repeat:
      until: review_passed
      max: 3
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      review:
        agents:
          - architect

  - step: summary
    pause: true
    input:
      - ui_layout.output
      - design_tree.output
      - implement.output
      - publish_ui.output
    with:
      logging:
        phases:
          - "finalize:after"
