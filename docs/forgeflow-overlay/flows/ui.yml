name: ui
description: "UI sub-flow — composables, layouts, виджеты экрана, ресурсы. Inline-разворачивается в master plan через `subflow:`. Модули и опции наследуются от master flow."

steps:
  - step: ui_walkthrough
    pause: true
    input:
      - scope_analysis.output
    with:
      logging:
        phases:
          - "finalize:after"

  - step: ui_layout
    pause: true
    input:
      - scope_analysis.output
      - business_summary.output
      - figma_dump.output
      - ui_walkthrough.output
    repeat:
      until: review_passed
      max: 3
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect

  - name: ui_design_tree
    step: design_tree
    output: ui_design_tree.md
    pause: true
    input:
      - scope_analysis.output
      - infra_summary.output
      - business_summary.output
      - figma_dump.output
      - ui_layout.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect

  - step: ui_implement
    pause: true
    input:
      - scope_analysis.output
      - business_summary.output
      - figma_dump.output
      - ui_layout.output
      - ui_design_tree.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - senior

  - step: publish_ui
    pause: true
    input:
      - ui_layout.output
      - ui_implement.output
    repeat:
      until: review_passed
      max: 3
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      review:
        agents:
          - architect

  - step: ui_summary
    pause: true
    input:
      - ui_layout.output
      - ui_design_tree.output
      - ui_implement.output
      - publish_ui.output
    with:
      logging:
        phases:
          - "finalize:after"
