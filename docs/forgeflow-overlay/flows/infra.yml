name: infra
description: "Infrastructure sub-flow — DI, mate framework, logger, Build, Manifest, CI, Guides. Inline-разворачивается в master plan через `subflow:`. Модули и опции наследуются от master flow."

steps:
  - step: infra_walkthrough
    pause: true
    input:
      - scope_analysis.output
    with:
      logging:
        phases:
          - "finalize:after"

  - name: infra_design_tree
    prompt: design_tree
    output: infra_design_tree.md
    pause: true
    input:
      - scope_analysis.output
      - infra_walkthrough.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect

  - name: infra_test
    prompt: test
    output: infra_test.md
    if: needs_tests
    pause: true
    input:
      - scope_analysis.output
      - infra_design_tree.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - qa_engineer

  - name: infra_implement
    prompt: implement
    output: infra_implement.md
    pause: true
    input:
      - scope_analysis.output
      - infra_design_tree.output
      - infra_test.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - senior

  - name: infra_summary
    prompt: summary
    output: infra_summary.md
    pause: true
    input:
      - infra_design_tree.output
      - infra_test.output
      - infra_implement.output
    with:
      logging:
        phases:
          - "finalize:after"
