name: business
description: "Business sub-flow — TEA-логика, UseCase контракты+impl, доменные сущности, specs. Inline-разворачивается в master plan через `subflow:`. Модули и опции наследуются от master flow."

steps:
  - step: business_walkthrough
    pause: true
    input:
      - scope_analysis.output
    with:
      logging:
        phases:
          - "finalize:after"

  - step: business_contract
    pause: true
    input:
      - scope_analysis.output
      - business_walkthrough.output
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true

  - step: business_contract_review
    input:
      - business_walkthrough.output
      - business_contract.output
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true

  - step: business_contract_spec
    pause: true
    input:
      - scope_analysis.output
      - business_contract.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect

  - name: business_design_tree
    step: design_tree
    output: business_design_tree.md
    pause: true
    input:
      - business_contract.output
      - business_contract_spec.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect

  - step: business_test
    pause: true
    input:
      - business_contract.output
      - business_design_tree.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - qa_engineer

  - step: business_implement
    pause: true
    input:
      - business_contract.output
      - business_design_tree.output
      - business_test.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      guides:
        enabled: true
      review:
        agents:
          - architect
          - senior

  - step: business_publish_spec
    pause: true
    input:
      - business_contract_spec.output
      - business_implement.output
    repeat:
      until: review_passed
      max: 7
      on_max: escalate
    with:
      logging:
        phases:
          - "finalize:after"
      review:
        agents:
          - architect

  - step: business_summary
    pause: true
    input:
      - business_design_tree.output
      - business_test.output
      - business_implement.output
      - business_publish_spec.output
    with:
      logging:
        phases:
          - "finalize:after"
